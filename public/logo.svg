<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="60" fill="transparent"/>
  
  <!-- Pipe icon -->
  <g transform="translate(8, 8)">
    <!-- Main pipe -->
    <rect x="2" y="10" width="6" height="20" fill="#2B5D4C" rx="1"/>
    <rect x="12" y="2" width="6" height="12" fill="#2B5D4C" rx="1"/>
    <rect x="12" y="18" width="6" height="12" fill="#2B5D4C" rx="1"/>
    <rect x="22" y="8" width="6" height="22" fill="#2B5D4C" rx="1"/>
    
    <!-- Connection points (gold accent) -->
    <circle cx="5" cy="8" r="1.5" fill="#C9A84C"/>
    <circle cx="15" cy="0" r="1.5" fill="#C9A84C"/>
    <circle cx="15" cy="30" r="1.5" fill="#C9A84C"/>
    <circle cx="25" cy="6" r="1.5" fill="#C9A84C"/>
  </g>
  
  <!-- Company text -->
  <text x="42" y="18" font-family="Arial, sans-serif" font-size="14" font-weight="900" fill="#2B5D4C">CRYSTAL</text>
  <text x="42" y="35" font-family="Arial, sans-serif" font-size="14" font-weight="900" fill="#2B5D4C">DRAIN</text>
  
  <!-- Accent line -->
  <line x1="42" y1="40" x2="190" y2="40" stroke="#C9A84C" stroke-width="1"/>
  
  <!-- Tagline -->
  <text x="42" y="52" font-family="Arial, sans-serif" font-size="8" fill="#666666" letter-spacing="1">& PLUMBING</text>
</svg>
